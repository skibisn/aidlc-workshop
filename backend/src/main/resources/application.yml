spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tableorder?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:tableorder}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      continue-on-error: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/, file:${UPLOAD_DIR:/uploads/menus}/

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:default-secret-key-must-be-changed-in-production-256bit}
  expiration: 57600000

upload:
  dir: ${UPLOAD_DIR:/uploads/menus}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
