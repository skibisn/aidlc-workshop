services:
  db:
    image: arm64v8/mysql:8.0
    platform: linux/arm64
    container_name: tableorder-db
    environment:
      MYSQL_DATABASE: tableorder
      MYSQL_USER: tableorder
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      cache_from:
        - tableorder-backend:latest
    container_name: tableorder-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/tableorder?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      DB_USERNAME: tableorder
      DB_PASSWORD: password
      JWT_SECRET: change-this-to-a-very-long-secret-key-256bit-minimum
      UPLOAD_DIR: /uploads/menus
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      DDL_AUTO: update
    volumes:
      - uploads:/uploads/menus
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      cache_from:
        - tableorder-frontend:latest
    container_name: tableorder-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
  uploads:
